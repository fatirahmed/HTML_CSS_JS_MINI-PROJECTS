<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS Tic Tac Toe</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
            font-family: sans-serif;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 5px;
        }

        input[type="checkbox"] {
            display: none;
        }

        label {
            width: 100px;
            height: 100px;
            background: #fff;
            border: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            cursor: pointer;
        }

        input:checked+label::before {
            content: "X";
            color: #ff3b3b;
        }

        input:checked:nth-child(even)+label::before {
            content: "O";
            color: #3b82f6;
        }
    </style>
</head>

<body>
    <div class="board">
        <input type="checkbox" id="c1"><label for="c1"></label>
        <input type="checkbox" id="c2"><label for="c2"></label>
        <input type="checkbox" id="c3"><label for="c3"></label>
        <input type="checkbox" id="c4"><label for="c4"></label>
        <input type="checkbox" id="c5"><label for="c5"></label>
        <input type="checkbox" id="c6"><label for="c6"></label>
        <input type="checkbox" id="c7"><label for="c7"></label>
        <input type="checkbox" id="c8"><label for="c8"></label>
        <input type="checkbox" id="c9"><label for="c9"></label>
    </div>
</body>

</html>
