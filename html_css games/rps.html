<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS Memory Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #333;
        }

        .game {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            gap: 10px;
        }

        .card {
            width: 100px;
            height: 100px;
            perspective: 600px;
        }

        input {
            display: none;
        }

        .face {
            width: 100%;
            height: 100%;
            background: #222;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 40px;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }

        .front {
            background: #555;
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
        }

        .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            transform: rotateY(180deg);
        }

        input:checked+label .face {
            transform: rotateY(180deg);
        }
    </style>
</head>

<body>
    <div class="game">
        <div class="card">
            <input type="checkbox" id="c1">
            <label for="c1">
                <div class="face">
                    <div class="front"></div>
                    <div class="back">🍎</div>
                </div>
            </label>
        </div>
        <div class="card">
            <input type="checkbox" id="c2">
            <label for="c2">
                <div class="face">
                    <div class="front"></div>
                    <div class="back">🍎</div>
                </div>
            </label>
        </div>
        <div class="card">
            <input type="checkbox" id="c3">
            <label for="c3">
                <div class="face">
                    <div class="front"></div>
                    <div class="back">🍌</div>
                </div>
            </label>
        </div>
        <div class="card">
            <input type="checkbox" id="c4">
            <label for="c4">
                <div class="face">
                    <div class="front"></div>
                    <div class="back">🍌</div>
                </div>
            </label>
        </div>
    </div>
</body>

</html>
