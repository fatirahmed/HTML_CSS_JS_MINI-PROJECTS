<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Black Hover Cover</title>

<style>
  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f2f2f2;
    font-family: Arial, sans-serif;
  }

  .btn {
    position: relative;
    width: 200px;
    height: 50px;
    border: 2px solid #000;
    color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    overflow: hidden;
    cursor: pointer;
  }

  .btn::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 0%;
    height: 100%;
    background: #000;
    transition: all 0.4s ease;
    z-index: -1;
  }

  .btn:hover::before {
    width: 100%;
  }

  .btn:hover {
    color: #fff;
  }
</style>

</head>
<body>

<div class="btn">Hover Me</div>

</body>
</html>
